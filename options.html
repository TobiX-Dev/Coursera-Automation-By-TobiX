<!doctype html>
<html>
<head>
<meta charset=UTF-8>
<title>Settings - Quiz AI Solver</title>
<style>@import url(https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap);*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#07070b;color:#e2e8f0;padding:32px 24px;min-height:100vh;display:flex;justify-content:center;align-items:center}.container{max-width:480px;width:100%;background:linear-gradient(160deg,#0d0d14,#07070b,#0a0812);border-radius:24px;padding:28px;border:1px solid rgba(124,58,237,.1);box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative;overflow:hidden}.container::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.3),transparent)}h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#fff,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.subtitle{font-size:.78rem;color:#52525b;margin-bottom:28px;letter-spacing:.2px}.section{background:rgba(14,14,20,.6);border-radius:18px;padding:20px;margin-bottom:18px;border:1px solid #141420;position:relative;overflow:hidden}.section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.15),transparent)}.section-title{font-size:.68rem;text-transform:uppercase;letter-spacing:1.2px;color:#71717a;margin-bottom:16px;font-weight:700}.field{margin-bottom:16px}.field label{display:block;font-size:.72rem;font-weight:600;color:#71717a;margin-bottom:6px}.field input{width:100%;padding:13px 16px;background:#0c0c12;border:1.5px solid #1e1e2e;border-radius:14px;color:#e2e8f0;font-size:.82rem;font-family:'JetBrains Mono','Fira Code',monospace;transition:all .25s}.field input:focus{outline:0;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12)}.field-note{font-size:.65rem;color:#52525b;margin-top:6px;line-height:1.5}.field-note a{color:#a78bfa;text-decoration:none;transition:color .2s}.field-note a:hover{color:#c4b5fd}.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;border-radius:14px;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .25s cubic-bezier(.2, .8, .2, 1);position:relative;overflow:hidden}.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:left .5s}.btn:hover::before{left:100%}.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.3)}.status{margin-top:12px;padding:10px;border-radius:10px;text-align:center;font-size:.68rem;font-weight:500}.status.success{background:rgba(16,185,129,.06);color:#34d399;border:1px solid rgba(16,185,129,.12)}.status.error{background:rgba(239,68,68,.06);color:#f87171;border:1px solid rgba(239,68,68,.12)}.footer{text-align:center;margin-top:20px;font-size:.62rem;color:#3f3f4f}.footer strong{background:linear-gradient(135deg,#a78bfa,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}</style>
</head>
<body>
<div class=container>
<h1>⚙️ Settings</h1>
<div class=subtitle>Configure your API key for AI-powered quiz solving</div>
<div class=section>
<div class=section-title>🔑 API Configuration</div>
<div class=field>
<label>API Key</label>
<input type=password id=apiKey placeholder="Enter your API key (starts with gsk_)">
<div class=field-note>
Get your free API key from <a href=https://console.groq.com/keys target=_blank>console.groq.com/keys</a>
</div>
</div>
<button class=btn id=saveBtn>Save API Key</button>
<div id=status class=status style=display:none></div>
</div>
<div class=section>
<div class=section-title>📌 About</div>
<div class=field-note style=margin-bottom:8px>
<strong>Free Tier:</strong> 30 requests/minute, 6,000+ requests/month
</div>
<div class=field-note>
<strong>Supported Models:</strong> Mixtral, Llama 3.3, and more
</div>
</div>
<div class=footer>
Powered by <strong>Mulga AI</strong> ✨
</div>
</div>
<script src=options.js></script>
</body>
</html>
