<!doctype html>

<style>@import url(https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap);*{margin:0;padding:0;box-sizing:border-box}body{width:380px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#07070b;overflow-x:hidden}.container{background:linear-gradient(160deg,#0d0d14 0,#07070b 50%,#0a0812 100%);padding:22px;position:relative;overflow:hidden}.container::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(139,92,246,.04) 0,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(99,102,241,.03) 0,transparent 50%);pointer-events:none;animation:ambientGlow 8s ease-in-out infinite alternate}@keyframes ambientGlow{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}#license-screen{animation:fadeInUp .5s cubic-bezier(.2,.9,.4,1.1);position:relative}#license-screen .header{text-align:center;margin-bottom:28px}.logo-wrapper{width:78px;height:78px;background:linear-gradient(135deg,#1a1530,#0e0e18);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 12px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.3);position:relative;transition:all .4s cubic-bezier(.2, .8, .2, 1)}.logo-wrapper:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 16px 40px rgba(139,92,246,.15),inset 0 1px 0 rgba(255,255,255,.06);border-color:rgba(139,92,246,.5)}.logo-wrapper::before{content:'';position:absolute;inset:-2px;background:conic-gradient(from 180deg,#8b5cf6,#6366f1,#a855f7,#8b5cf6);border-radius:26px;opacity:0;transition:opacity .4s ease;z-index:-1;animation:spinGlow 4s linear infinite}@keyframes spinGlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}.logo-wrapper:hover::before{opacity:.5}.logo-wrapper span{font-size:36px}.logo-wrapper img{width:50px;height:50px;object-fit:contain}h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#fff 0,#c4b5fd 50%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-.5px}.greeting{font-size:.72rem;color:#52525b;margin-top:4px;letter-spacing:.2px}.login-card{background:rgba(14,14,20,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:20px;padding:22px 18px;border:1px solid rgba(139,92,246,.12);margin-bottom:14px;position:relative;overflow:hidden}.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.3),transparent)}.input-group{margin-bottom:18px}.input-label{display:flex;align-items:center;gap:7px;font-size:.65rem;font-weight:700;color:#71717a;margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase}.input-label span{font-size:13px}.input-field{width:100%;padding:13px 16px;background:#0c0c12;border:1.5px solid #1f1f2b;border-radius:14px;color:#e2e8f0;font-family:'JetBrains Mono','Fira Code',monospace;font-size:.82rem;transition:all .25s cubic-bezier(.2, .8, .2, 1)}.input-field:focus{outline:0;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12),0 0 20px rgba(124,58,237,.08);background:#10101a}.input-field::placeholder{color:#3f3f50;font-family:Inter,sans-serif;font-size:.72rem}.action-buttons{display:flex;flex-direction:column;gap:10px;margin-top:6px}.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#7c3aed,#6366f1);border:none;border-radius:14px;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .25s cubic-bezier(.2, .8, .2, 1);display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;letter-spacing:.2px}.btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:left .5s}.btn-login:hover::before{left:100%}.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.3)}.btn-login:active{transform:translateY(0)}.btn-outline{width:100%;padding:11px;background:0 0;border:1.5px solid #1e1e2e;border-radius:14px;color:#a78bfa;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}.btn-outline:hover{border-color:#7c3aed;background:rgba(124,58,237,.06);transform:translateY(-1px)}.btn-test{background:0 0;border:1px solid #1e1e2e;color:#71717a}.btn-test:hover{border-color:#3b82f6;color:#60a5fa;background:rgba(59,130,246,.05)}.status-container{margin-top:16px;padding:11px;border-radius:12px;text-align:center;font-size:.68rem;font-weight:500;transition:all .3s}.status-container.success{background:rgba(16,185,129,.06);color:#34d399;border:1px solid rgba(16,185,129,.15)}.status-container.error{background:rgba(239,68,68,.06);color:#f87171;border:1px solid rgba(239,68,68,.15)}.status-container.info{background:rgba(124,58,237,.06);color:#a78bfa;border:1px solid rgba(124,58,237,.15)}#expiryDisplay{text-align:center}.expiry-info{font-size:.68rem;color:#10b981;margin-top:10px;text-align:center;padding:8px;border-radius:10px;background:rgba(16,185,129,.04)}.expiry-expired{color:#ef4444;text-align:center}.divider-login{display:flex;align-items:center;gap:12px;margin:16px 0 12px}.divider-login::after,.divider-login::before{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,#1a1a28,transparent)}.divider-login span{font-size:.6rem;color:#3f3f4f;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}#main-ui{animation:fadeInUp .4s ease-out;position:relative}#main-ui .header{text-align:center;margin-bottom:20px}.logo{width:68px;height:68px;background:linear-gradient(135deg,#1a1530,#0e0e18);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 24px rgba(0,0,0,.5);border:1px solid rgba(139,92,246,.2);transition:all .3s ease}.logo:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(139,92,246,.12);border-color:rgba(139,92,246,.4)}.logo span{font-size:30px}.logo img{width:44px;height:44px;object-fit:contain}.badge{display:inline-block;background:rgba(124,58,237,.1);color:#a78bfa;font-size:.55rem;padding:4px 14px;border-radius:30px;margin-top:8px;border:1px solid rgba(124,58,237,.2);font-weight:600;letter-spacing:.3px}.star-repo-banner{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;margin-bottom:18px;background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(245,158,11,.04));border:1px solid rgba(251,191,36,.15);border-radius:14px;cursor:pointer;transition:all .3s cubic-bezier(.2, .8, .2, 1);text-decoration:none;position:relative;overflow:hidden}.star-repo-banner::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(251,191,36,.06),transparent);transition:left .6s}.star-repo-banner:hover::before{left:100%}.star-repo-banner:hover{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.07));border-color:rgba(251,191,36,.3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(251,191,36,.08)}.star-repo-banner .star-icon{font-size:16px;animation:starPulse 2s ease-in-out infinite}@keyframes starPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}.star-repo-banner .star-text{font-size:.72rem;font-weight:600;color:#fbbf24;letter-spacing:.2px}.star-repo-banner .star-arrow{font-size:.65rem;color:#d97706;transition:transform .3s}.star-repo-banner:hover .star-arrow{transform:translateX(3px)}.button-group{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}.btn{width:100%;padding:13px 16px;border:none;border-radius:14px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .25s cubic-bezier(.2, .8, .2, 1);display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}.btn-primary{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.2)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.3)}.btn-primary:active{transform:translateY(0)}.btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.2)}.btn-success:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.3)}.btn-success:active{transform:translateY(0)}.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}.mini-actions .btn{padding:10px 12px;font-size:.72rem;background:rgba(14,14,20,.8);border:1px solid #18182a;color:#d1d5db;box-shadow:none;font-weight:500}.mini-actions .btn:hover{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.3);transform:translateY(-1px);color:#e2e8f0}.mini-actions .btn.full-width{grid-column:1/-1}.divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px}.divider::after,.divider::before{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,#1a1a28,transparent)}.divider span{font-size:.65rem;color:#52525b;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}.api-section{background:rgba(10,10,16,.6);border-radius:16px;padding:16px;border:1px solid #141420;position:relative;overflow:hidden}.api-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.2),transparent)}.api-label{font-size:.7rem;font-weight:600;color:#71717a;margin-bottom:10px;display:flex;align-items:center;gap:6px}.api-row{display:flex;gap:8px}.api-row input{flex:1;padding:11px 13px;background:#0c0c12;border:1px solid #1e1e2e;border-radius:12px;color:#e2e8f0;font-size:.72rem;font-family:'JetBrains Mono','Fira Code',monospace;transition:all .25s}.api-row input:focus{outline:0;border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.1)}.api-row button{padding:11px 18px;background:#141420;color:#e2e8f0;border:1px solid #1e1e2e;border-radius:12px;cursor:pointer;font-size:.68rem;font-weight:600;transition:all .25s;letter-spacing:.3px}.api-row button:hover{background:#1e1e30;border-color:#7c3aed}.status{font-size:.62rem;padding:10px;border-radius:10px;margin-top:10px;text-align:center;font-weight:500}.status.success{background:rgba(16,185,129,.06);color:#34d399;border:1px solid rgba(16,185,129,.12)}.status.error{background:rgba(239,68,68,.06);color:#f87171;border:1px solid rgba(239,68,68,.12)}.status.info{background:rgba(124,58,237,.06);color:#a78bfa;border:1px solid rgba(124,58,237,.12)}.link{color:#a78bfa;text-decoration:none;transition:color .2s}.link:hover{color:#c4b5fd;text-decoration:underline}footer{text-align:center;padding-top:14px;margin-top:14px;border-top:1px solid rgba(255,255,255,.03)}.powered-by{font-size:.58rem;color:#52525b;letter-spacing:.2px}.powered-by strong{background:linear-gradient(135deg,#a78bfa,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.logout-btn{background:0 0;border:1px solid rgba(239,68,68,.15);color:#71717a;font-size:.6rem;cursor:pointer;padding:5px 14px;border-radius:8px;margin-top:8px;transition:all .25s;font-weight:500}.logout-btn:hover{color:#f87171;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:#1e1e2e;border-radius:4px}</style>

<body>
<div class=container>
<div id=license-screen>
<div class=header>
<div class=logo-wrapper id=login-logo>
<img src=icons/logo.png style=width:48px;height:48px;object-fit:contain>
</div>
<h1>Welcome Back</h1>
<div class=greeting>Enter your credentials to continue</div>
</div>
<div class=login-card>
<div class=input-group>
<div class=input-label>
<span>🔐</span>
<span>ACTIVATION KEY</span>
</div>
<input type=password id=licenseKeyInput class=input-field placeholder="Enter your key">
</div>
<div class=action-buttons>
<button class=btn-login id=verifyLicenseBtn>
<span>✨</span> Unlock Extension
</button>
<button class=btn-outline id=buyKeyBtn>
<span>⚡</span>Get a Key
</button>
<button class="btn-outline btn-test" id=testConnectionBtn>
<span>🌐</span> Check Status
</button>
</div>
<div id=licenseStatus class="status-container info">
Enter your key to unlock the extension.
</div>
<div id=expiryDisplay class=expiry-info style=display:none></div>
</div>
<div class=divider-login>
<span>Thx For Using</span>
</div>
</div>
<div id=main-ui style=display:none>
<div class=header>
<div class=logo id=main-logo>
<img src=icons/logo1.png style=width:42px;height:42px;object-fit:contain>
</div>
<h1>Coursera Solver</h1>
<div class=subtitle style=font-size:.68rem;color:#52525b;letter-spacing:.2px>Intelligent Coursera Assistant</div>
<div class=badge>⚡ Powered by Backend</div>
</div>
<div id=tier-badge style=display:block;text-align:center;margin-bottom:10px><span id=tier-badge-inner style="display:inline-block;font-size:1rem;font-weight:700;padding:3px 12px;border-radius:20px;line-height:1.6"></span>
</div>
<div class=star-repo-banner id=starRepoBtn>
<span class=star-icon>⭐</span>
<span class=star-text>Star The Repo</span>
<span class=star-arrow>→</span>
</div>
<div class=button-group>
<button class="btn btn-primary" id=solveQuizBtn>
✨ Solve This Quiz
</button>
<button class="btn btn-success" id=solveAllBtn>
🚀 Solve All Quizzes
</button>
</div>
<div class=mini-actions>
<button class=btn id=skipVideosBtn>
🎬 Skip Videos
</button>
<button class=btn id=skipReadingsBtn>
📖 Skip Readings
</button>
<button class=btn id=skipDiscussionBtn>
💬 Skip Discussion
</button>
<button class=btn id=skipPluginsBtn>
🔌 Skip Plugins
</button>
<button class="btn full-width" id=shareableLinkBtn>
🔗 Shareable Link
</button>
</div>
<div class=divider>
<span>⚙️ Settings</span>
</div>
<div class=api-section>
<div class=api-label>
🔑 Groq API Key
</div>
<div class=api-row>
<input type=password id=apiKey placeholder="Enter your API key (gsk_...)" autocomplete=off>
<button id=saveKey>Save</button>
</div>
<div class="status info" id=apiStatus>
🔑 Get free key: <a href=https://console.groq.com/keys target=_blank class=link>console.groq.com/keys</a>
</div>
</div>
<footer>
<div class=powered-by>Powered by <strong>Mulga </strong> ✨</div>
<div>
<button id=logoutBtn class=logout-btn>🚪 Logout</button>
</div>
</footer>
</div>
</div>
<script src=popup.js></script>
</body>
</html>
